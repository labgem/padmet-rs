[book]
title        = "padmet-rs"
authors      = ["Samuel Ortion"]
description  = "Read and write PADMet files in Rust"
language     = "en"
multilingual = false
src          = "website"

[build]
build-dir      = "public"
create-missing = false

[output.html]
smart-punctuation = true
mathjax-support = true
git-repository-url = "https://forge.s1gm4.eu/sortion/padmet-rs/"
git-repository-icon = "fa-git"
edit-url-template = "https://forge.s1gm4.eu/sortion/padmet/edit/main/docs/{path}"
site-url = "https://s.ortion.fr/dev/padmet-rs/"