[book]
title        = "padmet-rs"
authors      = ["Samuel Ortion"]
description  = "Read and write PADMet files in Rust"
language     = "en"
# multilingual = false
src          = "website"

[build]
build-dir      = "public"
create-missing = false

[output.html]
smart-punctuation = true
mathjax-support = true
git-repository-url = "https://github.com/labgem/padmet-rs/"
git-repository-icon = "fab-git"
edit-url-template = "https://github.com/samuelortion/padmet-rs/edit/main/website/{path}.md"
site-url = "https://s.ortion.fr/dev/padmet-rs/"